name: DB Explorer CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff
        run: ruff check .

  build:
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Ensure local wheels are found by pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          pyinstaller DB_Explorer.spec
      - name: Upload Artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: DB_Explorer_Executable
          path: dist/DB_Explorer

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download Artifact
        uses: actions/download-artifact@v4.1.9
        with:
          name: DB_Explorer_Executable
          path: dist/DB_Explorer

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2.4.0
        with:
          files: installer_output/DB_Explorer_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
